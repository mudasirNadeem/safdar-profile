<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel | Safdar Hashim</title>
    <style>
        :root { --accent: #ff8c00; --bg: #f5f6fa; --card: #fff; --text: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 30px; }
        h1 { margin-bottom: 20px; }
        .card { background: var(--card); border-radius: 14px; box-shadow: 0 6px 20px rgba(0,0,0,.06); padding: 30px; max-width: 1000px; margin: 0 auto; }
        .login { max-width: 380px; }
        input { width: 100%; padding: 14px; margin-bottom: 14px; border: 2px solid #eee; border-radius: 10px; outline: none; font-size: 1rem; }
        button { background: var(--accent); color: #fff; border: none; padding: 14px 22px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        button:hover { opacity: .9; }
        .err { color: #d33; margin-bottom: 12px; min-height: 1.2em; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; max-width: 1000px; margin-left: auto; margin-right: auto; }
        .logout { background: #555; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; vertical-align: top; }
        th { color: var(--accent); font-size: .85rem; text-transform: uppercase; letter-spacing: .5px; }
        td.msg { max-width: 380px; white-space: pre-wrap; }
        .muted { color: #888; font-size: .85rem; }
        .hidden { display: none; }
        .count { font-weight: normal; color: #888; font-size: 1rem; }

        /* toolbar above the table: delete button + selection info */
        .toolbar { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; min-height: 44px; flex-wrap: wrap; }
        .danger { background: #d9534f; }
        .danger:disabled { background: #e6a6a4; cursor: not-allowed; opacity: 1; }
        .sel-info { color: #888; font-size: .9rem; }

        /* checkbox column */
        td.chk, th.chk { width: 36px; text-align: center; }
        input[type="checkbox"] { width: auto; margin: 0; cursor: pointer; transform: scale(1.2); }

        /* pagination footer */
        .pager { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .pager button { background: #fff; color: var(--text); border: 2px solid #eee; padding: 8px 16px; }
        .pager button:disabled { color: #bbb; cursor: not-allowed; }
        .pager .page-label { color: #555; font-size: .9rem; }
    </style>
</head>
<body> 
    <!-- LOGIN VIEW -->
    <div id="loginView">
        <div class="card login">
            <h1>Admin Login</h1>
            <div class="err" id="loginErr"></div>
            <form id="loginForm">
                <input type="email" id="email" placeholder="Email" value="admin@gmail.com" required />
                <input type="password" id="password" placeholder="Password" required />
                <button type="submit">Log In</button>
            </form>
        </div>
    </div>

    <!-- PANEL VIEW -->
    <div id="panelView" class="hidden">
        <div class="topbar">
            <h1>Contact Submissions <span class="count" id="count"></span></h1>
            <button class="logout" id="logoutBtn">Log Out</button>
        </div>
        <div class="card">
            <div class="toolbar">
                <button class="danger" id="deleteBtn" type="button" disabled>Delete Selected</button>
                <span class="sel-info" id="selInfo">No rows selected</span>
            </div>
            <div id="tableWrap"><p class="muted">Loading…</p></div>
            <div class="pager hidden" id="pager">
                <button id="prevBtn" type="button">‹ Prev</button>
                <span class="page-label" id="pageLabel"></span>
                <button id="nextBtn" type="button">Next ›</button>
            </div>
        </div>
    </div>

    <script>
        const TOKEN_KEY = 'admin_token';
        const loginView = document.getElementById('loginView');
        const panelView = document.getElementById('panelView');
        const loginForm = document.getElementById('loginForm');
        const loginErr = document.getElementById('loginErr');

        function showPanel() {
            loginView.classList.add('hidden');
            panelView.classList.remove('hidden');
            loadMessages();
        }
        function showLogin() {
            panelView.classList.add('hidden');
            loginView.classList.remove('hidden');
        }

        // If already logged in, go straight to the panel.
        if (localStorage.getItem(TOKEN_KEY)) showPanel();

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginErr.textContent = '';
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    loginErr.textContent = data.error || 'Login failed';
                    return;
                }
                localStorage.setItem(TOKEN_KEY, data.token);
                showPanel();
            } catch {
                loginErr.textContent = 'Network error';
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem(TOKEN_KEY);
            showLogin();
        });

        // ---- Pagination + selection state ----
        const PAGE_SIZE = 10;
        let currentPage = 1;
        let totalPages = 1;

        const wrap = document.getElementById('tableWrap');
        const pager = document.getElementById('pager');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageLabel = document.getElementById('pageLabel');
        const deleteBtn = document.getElementById('deleteBtn');
        const selInfo = document.getElementById('selInfo');

        prevBtn.addEventListener('click', () => { if (currentPage > 1) { currentPage--; loadMessages(); } });
        nextBtn.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; loadMessages(); } });
        deleteBtn.addEventListener('click', deleteSelected);

        function authHeaders() {
            return { Authorization: 'Bearer ' + localStorage.getItem(TOKEN_KEY) };
        }

        function handleAuthFail(res) {
            if (res.status === 401 || res.status === 403) {
                localStorage.removeItem(TOKEN_KEY);
                showLogin();
                return true;
            }
            return false;
        }

        async function loadMessages() {
            try {
                const res = await fetch(`/api/admin/messages?page=${currentPage}&limit=${PAGE_SIZE}`, {
                    headers: authHeaders()
                });
                if (handleAuthFail(res)) return;

                const data = await res.json();
                const rows = data.messages || [];
                totalPages = data.totalPages || 1;
                currentPage = data.page || 1;

                document.getElementById('count').textContent = '(' + (data.total ?? rows.length) + ')';

                if (rows.length === 0) {
                    wrap.innerHTML = '<p class="muted">No submissions yet.</p>';
                    pager.classList.add('hidden');
                    updateSelection();
                    return;
                }

                const body = rows.map(r => `
                    <tr>
                        <td class="chk"><input type="checkbox" class="row-chk" value="${r.id}"></td>
                        <td>${escapeHtml(r.name)}</td>
                        <td><a href="mailto:${escapeHtml(r.email)}">${escapeHtml(r.email)}</a></td>
                        <td class="msg">${escapeHtml(r.message)}</td>
                        <td class="muted">${new Date(r.created_at).toLocaleString()}</td>
                    </tr>`).join('');

                wrap.innerHTML = `
                    <table>
                        <thead><tr>
                            <th class="chk"><input type="checkbox" id="selectAll" title="Select all on this page"></th>
                            <th>Name</th><th>Email</th><th>Message</th><th>Received</th>
                        </tr></thead>
                        <tbody>${body}</tbody>
                    </table>`;

                // Wire up checkboxes
                document.getElementById('selectAll').addEventListener('change', (e) => {
                    document.querySelectorAll('.row-chk').forEach(cb => { cb.checked = e.target.checked; });
                    updateSelection();
                });
                document.querySelectorAll('.row-chk').forEach(cb =>
                    cb.addEventListener('change', updateSelection)
                );

                // Pagination footer
                pager.classList.remove('hidden');
                pageLabel.textContent = `Page ${currentPage} of ${totalPages}`;
                prevBtn.disabled = currentPage <= 1;
                nextBtn.disabled = currentPage >= totalPages;

                updateSelection();
            } catch {
                wrap.innerHTML = '<p class="err">Could not load messages.</p>';
            }
        }

        function getSelectedIds() {
            return Array.from(document.querySelectorAll('.row-chk:checked')).map(cb => Number(cb.value));
        }

        function updateSelection() {
            const n = getSelectedIds().length;
            deleteBtn.disabled = n === 0;
            selInfo.textContent = n === 0 ? 'No rows selected' : `${n} selected`;
            const selectAll = document.getElementById('selectAll');
            if (selectAll) {
                const total = document.querySelectorAll('.row-chk').length;
                selectAll.checked = total > 0 && n === total;
            }
        }

        async function deleteSelected() {
            const ids = getSelectedIds();
            if (ids.length === 0) return;
            if (!confirm(`Delete ${ids.length} message(s)? This cannot be undone.`)) return;

            deleteBtn.disabled = true;
            try {
                const res = await fetch('/api/admin/messages', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json', ...authHeaders() },
                    body: JSON.stringify({ ids })
                });
                if (handleAuthFail(res)) return;
                if (!res.ok) { alert('Delete failed'); return; }

                // If we deleted the last items on the last page, step back a page.
                if (currentPage > 1) {
                    const remainingOnPage = document.querySelectorAll('.row-chk').length - ids.length;
                    if (remainingOnPage <= 0) currentPage--;
                }
                loadMessages();
            } catch {
                alert('Network error while deleting');
            } finally {
                updateSelection();
            }
        }

        function escapeHtml(str) {
            return String(str ?? '').replace(/[&<>"']/g, c => (
                { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
            ));
        }
    </script>
</body>
</html>
